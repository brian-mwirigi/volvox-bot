name: CD

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/volvoxllc/volvox-bot

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        env:
          FULL_SHA: ${{ github.sha }}
        run: |
          SHA_SHORT=$(echo "$FULL_SHA" | cut -c1-7)
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - name: Build & push bot
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/bot:latest
            ${{ env.IMAGE_PREFIX }}/bot:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=volvox-bot
          cache-to: type=gha,mode=max,scope=volvox-bot

      - name: Build & push web
        uses: docker/build-push-action@v7.0.0
        with:
          context: web
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:latest
            ${{ env.IMAGE_PREFIX }}/web:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=volvox-web
          cache-to: type=gha,mode=max,scope=volvox-web

      - name: Build & push docs
        uses: docker/build-push-action@v7.0.0
        with:
          context: docs
          file: docs/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/docs:latest
            ${{ env.IMAGE_PREFIX }}/docs:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=volvox-docs
          cache-to: type=gha,mode=max,scope=volvox-docs
